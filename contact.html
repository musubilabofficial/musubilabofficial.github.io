<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - 結 -MUSUBI-</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        :root { --indigo: #0A192F; --gold: #D4AF37; --gold-light: rgba(212, 175, 55, 0.15); --text: #F5F5F5; --white-glass: rgba(255, 255, 255, 0.05); --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--indigo); color: var(--text); font-family: 'Shippori Mincho', serif; line-height: 1.8; }
        header { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: linear-gradient(to bottom, rgba(10, 25, 47, 0.8), transparent); backdrop-filter: blur(5px); }
        .logo { font-size: 1.5rem; letter-spacing: 0.3rem; color: var(--gold); font-weight: bold; text-decoration: none; white-space: nowrap; }
        .nav-menu { display: flex; align-items: center; }
        .nav-menu a { color: var(--text); text-decoration: none; font-size: 0.9rem; margin-left: 30px; opacity: 0.7; transition: var(--transition); }
        .nav-menu a:hover { opacity: 1; color: var(--gold); }
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 101; }
        .hamburger span { width: 25px; height: 2px; background-color: var(--gold); }

        .hero-subpage { height: 50vh; background: linear-gradient(rgba(10, 25, 47, 0.6), rgba(10, 25, 47, 0.6)), url('image/Contact.png'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .page-title { font-size: clamp(2rem, 5vw, 3rem); color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 20px; }

        .container { max-width: 700px; margin: -100px auto 100px; padding: 0 20px; position: relative; z-index: 10; }
        .contact-form { background: var(--white-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: clamp(30px, 5vw, 60px); }
        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.1rem; }
        .input-group input, .input-group textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 0; font-family: inherit; outline: none; font-size: 1rem; }
        .btn-submit { background: var(--gold); color: var(--indigo); border: none; padding: 15px 50px; font-weight: bold; letter-spacing: 0.2rem; cursor: pointer; transition: var(--transition); width: 100%; margin-top: 20px; }
        .btn-submit:hover { background: white; }

        footer { padding: 60px 20px; background: #050C16; text-align: center; font-size: 0.8rem; opacity: 0.6; }
        .footer-links a { color: var(--text); text-decoration: none; margin: 0 15px; }

        @media (max-width: 768px) {
            header { padding: 15px 20px; } .logo { font-size: 1.2rem; }
            .nav-menu { position: fixed; top: 0; right: -100%; width: 70%; height: 100vh; background: var(--indigo); flex-direction: column; justify-content: center; transition: 0.4s; }
            .nav-menu.open { right: 0; } .nav-menu a { margin: 20px 0; font-size: 1.2rem; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body onclick="closeMenu(event)">
    <header>
        <a href="index.html" class="logo">結 -MUSUBI-</a>
        <nav class="nav-menu" id="navMenu">
            <a href="about.html">物語と手法</a>
            <a href="report_info.html">解析書の全容</a>
            <a href="faq.html">よくある質問</a>
            <a href="testimonials.html">解読者の声</a>
            <a href="contact.html">お問い合わせ</a>
            <a href="index.html#input-form" class="highlight" style="border: 1px solid var(--gold); padding: 5px 15px; border-radius: 2px;">解析の刻を始める</a>
        </nav>
        <div class="hamburger" id="hamburger" onclick="toggleMenu(event)"><span></span><span></span><span></span></div>
    </header>

    <section class="hero-subpage">
        <h1 class="page-title">お問い合わせ</h1>
        <p style="letter-spacing: 0.2rem; opacity: 0.8;">解析に関するご質問、不具合のご報告はこちらから</p>
    </section>

    <div class="container">
        <form class="contact-form">
            <div class="input-group"><label>御芳名</label><input type="text" placeholder="姓名をご入力ください"></div>
            <div class="input-group"><label>メールアドレス</label><input type="email" placeholder="example@mail.com"></div>
            <div class="input-group"><label>件名</label><input type="text" placeholder="お問い合わせ内容のタイトル"></div>
            <div class="input-group"><label>内容</label><textarea rows="5" placeholder="詳細をご入力ください"></textarea></div>
            <button type="button" class="btn-submit" onclick="alert('お問い合わせを送信しました（モックアップ）')">送信する</button>
        </form>
    </div>

    <footer>
        <div class="footer-links"><a href="index.html">ホーム</a><a href="legal.html#sctl">特定商取引法</a><a href="legal.html#privacy">個人情報保護</a></div>
        <p>© 結 -MUSUBI- 宿命の解析</p>
    </footer>

    <script>
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('navMenu').classList.toggle('open'); document.getElementById('hamburger').classList.toggle('active'); }
        function closeMenu(e) { const nav = document.getElementById('navMenu'); if (nav.classList.contains('open')) { nav.classList.remove('open'); } }
    </script>
</body>
</html>
